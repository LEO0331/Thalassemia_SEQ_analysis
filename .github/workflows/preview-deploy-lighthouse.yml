name: Preview Deploy + Lighthouse

on:
  pull_request:
  workflow_dispatch:

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel secrets."
            echo "Please set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in GitHub repository secrets."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --yes --token "$VERCEL_TOKEN")
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Comment preview URL
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview deployment is ready: ${url}`
            });

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: ${{ needs.deploy-preview.outputs.preview_url != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy-preview.outputs.preview_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
